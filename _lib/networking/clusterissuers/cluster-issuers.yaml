---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  namespace: cert-manager
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: homelab@th0th.dev
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - dns01:
          cloudflare:
            email: cloudflare@th0th.dev
            apiTokenSecretRef:
              name: "cf-token"
              key: cloudflare-token
        selector:
          dnsZones:
            - "th0th.dev"
            - "cilium.io"
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
  namespace: cert-manager
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: homelab@th0th.dev
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      - dns01:
          cloudflare:
            email: cloudflare@th0th.dev
            apiTokenSecretRef:
              name: "cf-token"
              key: cloudflare-token
        selector:
          dnsZones:
            - "th0th.dev"
            - "cilium.io"
