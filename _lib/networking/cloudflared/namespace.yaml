---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudflared
  labels:
    app: cloudflared
    env: ${ENVIRONMENT}
    owner: ${OWNER}
    # Kyverno app policies + (future) NetworkPolicies target this label.
    th0th.dev/policy-target: application
    # cloudflared runs fine as non-root with no extra capabilities.
    pod-security.kubernetes.io/enforce: restricted
