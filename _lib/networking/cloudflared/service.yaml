---
apiVersion: v1
kind: Service
metadata:
  name: cloudflared-metrics
  namespace: cloudflared
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/instance: cloudflared-${ENVIRONMENT}
spec:
  # ClusterIP so the ServiceMonitor in monitoring/ can discover endpoints.
  # cloudflared is outbound-only — this Service is solely for /metrics scraping.
  type: ClusterIP
  selector:
    app: cloudflared
  ports:
    - name: metrics
      port: 2000
      targetPort: metrics
      protocol: TCP
