---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-tunnel-token
  namespace: cloudflared
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: cloudflared-tunnel-token
    creationPolicy: Owner
  data:
    # Connector token for the remotely-managed tunnel (created in the Cloudflare
    # Zero Trust dashboard). NOT a scoped API token — it's the tunnel's own
    # credential. Stored in 1Password item `cf_tunnel_th0th.dev`, field
    # `tunnel-token`.
    - secretKey: tunnel-token
      remoteRef:
        key: cf_tunnel_th0th.dev
        property: tunnel-token
