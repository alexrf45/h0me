---
apiVersion: v1
kind: LimitRange
metadata:
  name: cloudflared-defaults
  namespace: cloudflared
spec:
  limits:
    # Safety-net defaults for any container that omits resources. The cloudflared
    # container sets its own, so these only apply to future additions.
    - type: Container
      defaultRequest:
        cpu: 25m
        memory: 32Mi
      default:
        cpu: 200m
        memory: 128Mi
