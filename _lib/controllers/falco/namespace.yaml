---
apiVersion: v1
kind: Namespace
metadata:
  name: security
  labels:
    app: falco
    # Falco needs hostPID, hostNetwork, and a privileged container for the
    # modern_ebpf driver. Talos defaults namespaces to baseline; privileged
    # is the canonical level for host-scoped collectors.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
