---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: flux-system
spec:
  interval: 15m
  chart:
    spec:
      chart: falco
      version: 8.0.0
      sourceRef:
        name: falcosecurity
        kind: HelmRepository
        namespace: flux-system
  # CRD ownership: per .claude/rules/crds.md, operator HRs do not install
  # CRDs — global/crds/ does. The falcosecurity/falco 8.0.0 chart ships no
  # CRDs of its own (the only CRD it consumes — monitoring.coreos.com/
  # ServiceMonitor — is already owned by global/crds/prometheus-operator-crds/).
  # `crds: Skip` is truthful here and forward-safe if the chart ever grows a
  # CRD bundle.
  install:
    crds: Skip
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    crds: Skip
    remediation:
      retries: -1
  uninstall:
    keepHistory: false
  targetNamespace: security
  values:
    nameOverride: "falcosecurity"
    image:
      pullPolicy: Always
    driver:
      kind: modern_ebpf
    tty: true
    controller:
      kind: daemonset
    tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
    collectors:
      engines:
        containerd:
          enabled: true
          socket: /run/containerd/containerd.sock
        docker:
          enabled: false
        cri:
          enabled: true
        lxc:
          enabled: false
        libvirt_lxc:
          enabled: false
      kubernetes:
        enabled: true
    falco:
      json_output: true
      json_include_output_property: true
      log_stderr: true
      log_syslog: false
      log_level: info
      priority: notice
      buffered_outputs: false
      file_output:
        enabled: true
        keep_alive: true
      grpc:
        enabled: true
        bind_address: "unix:///run/falco/falco.sock"
        threadiness: 0
      grpc_output:
        enabled: false
      http_output:
        enabled: true
        url: "http://falco-falcosidekick:2801/"
        user_agent: "falcosecurity/falco"
        compress_uploads: true
        keep_alive: true
        max_consecutive_timeouts: 10
      rules_files:
        - /etc/falco/falco_rules.yaml
        - /etc/falco/falco-incubating_rules.yaml
        - /etc/falco/rules.d
      plugins:
        - name: json
          library_path: libjson.so
          init_config: ""
      load_plugins: []
    falcoctl:
      image:
        pullPolicy: Always
      artifact:
        install:
          enabled: true
        follow:
          enabled: true
      config:
        artifact:
          install:
            refs:
              - falco-rules:latest
              - falco-incubating-rules:latest
          follow:
            refs:
              - falco-rules:latest
              - falco-incubating-rules:latest
    metrics:
      enabled: true
    # The chart's chart-side ServiceMonitor is intentionally off — the SM is
    # owned by _lib/observability/kube-prometheus-stack/servicemonitor-falco.yaml
    # to keep all scrape configs in one place (matches the cloudflared / flux
    # pattern). NB: the chart's key is `create`, not `enabled` (the previous
    # `enabled: true` was a no-op typo).
    serviceMonitor:
      create: false
    grafana:
      dashboards:
        enabled: true

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1024Mi

    # F-1 — mount the in-repo falco-custom-rules ConfigMap (security ns,
    # name: falco-custom-rules) into /etc/falco/rules.d so the engine picks
    # up the th0th custom-rule library. The chart's `mounts.volumes` /
    # `mounts.volumeMounts` lists are appended to the Falco DS pod spec
    # without overriding the chart's stock volumes (rules-volume etc.).
    # falco.rules_files already lists /etc/falco/rules.d above.
    mounts:
      volumes:
        - name: custom-rules
          configMap:
            name: falco-custom-rules
      volumeMounts:
        - name: custom-rules
          mountPath: /etc/falco/rules.d
    falcosidekick:
      enabled: true
      responseActions:
        enabled: true
      replicaCount: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      # F-2 — disable the falcosidekick web UI + its bundled Redis. The UI
      # shipped on by default in chart 8.0.0 (falcosidekick subchart 0.12.x),
      # standing up a Deployment + a stateful Redis with a 1Gi iSCSI PVC. We
      # surface alerts via Falco → falcosidekick HTTP → downstream (the
      # http_output block above keeps the falcosidekick svc wired), so the
      # web UI + Redis pair adds storage + attack surface for no win in a
      # single-operator homelab. Disabling here drops the Deployment, the
      # Service, and the Redis StatefulSet. NB: the orphaned
      # security-falco-falcosidekick-ui-redis-data PVC will go unbound on
      # the Retain-policy iSCSI StorageClass — manual TrueNAS zvol cleanup
      # is needed post-merge to reclaim the 1Gi.
      webui:
        enabled: false
        redis:
          enabled: false
