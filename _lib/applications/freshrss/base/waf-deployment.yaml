---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss-waf
  namespace: freshrss
  labels:
    app.kubernetes.io/name: freshrss-waf
    app.kubernetes.io/instance: freshrss-waf-${ENVIRONMENT}
    app.kubernetes.io/version: "4.25.0"
    environment: "${ENVIRONMENT}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freshrss-waf
  template:
    metadata:
      labels:
        app: freshrss-waf
        node: worker
        env: "${ENVIRONMENT}"
        app.kubernetes.io/name: freshrss-waf
        app.kubernetes.io/instance: freshrss-waf-${ENVIRONMENT}
        app.kubernetes.io/version: "4.25.0"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: coraza
          image: ghcr.io/coreruleset/coraza-crs:4.25.0-caddy-alpine-202604120304
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            # Upstream FreshRSS app Service (in-namespace).
            - name: BACKEND
              value: freshrss.freshrss.svc.cluster.local:80
            - name: PORT
              value: "8080"
            # Phase 1: observe + tune. Flip to "On" to block after tuning.
            - name: CORAZA_RULE_ENGINE
              value: DetectionOnly
            - name: PARANOIA
              value: "1"
            - name: BLOCKING_PARANOIA
              value: "1"
            - name: ANOMALY_INBOUND
              value: "5"
            - name: CORAZA_AUDIT_LOG
              value: /dev/stdout
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
          volumeMounts:
            - name: overrides
              mountPath: /opt/coraza/overrides
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: overrides
          configMap:
            name: freshrss-waf-overrides
