---
# Static PV for the gatus CNPG cluster data volume (N-6: memory → postgres).
#
# Manually pre-created zvol + iSCSI target/extent on TrueNAS:
#   zvol:    dev-gatus-db (10Gi, parent: home-share/iscsi/k8s/dev/volumes)
#   IQN:     iqn.2005-10.org.freenas.ctl:dev-gatus-db, LUN 0
#
# claimRef pins this PV to the PVC the operator will create
# (`gatus-${ENVIRONMENT}-cluster-1`) so nothing else can grab it.
# Reclaim: Retain — deleting the PVC won't drop the zvol.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: dev-gatus-db-pv
  labels:
    env: dev
    app: gatus
    component: database
    persistent: "true"
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: iscsi
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    namespace: gatus
    name: gatus-${ENVIRONMENT}-cluster-1
  csi:
    driver: freenas-api-iscsi
    fsType: ext4
    volumeHandle: dev-gatus-db
    volumeAttributes:
      lun: "0"
      interface: ""
      node_attach_driver: iscsi
      provisioner_driver: freenas-api-iscsi
      portal: "192.168.20.106:3260"
      portals: ""
      iqn: "iqn.2005-10.org.freenas.ctl:dev-gatus-db"
