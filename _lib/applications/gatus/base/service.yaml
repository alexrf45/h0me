---
apiVersion: v1
kind: Service
metadata:
  name: gatus
  namespace: gatus
  labels:
    app.kubernetes.io/name: gatus
    app.kubernetes.io/instance: gatus-${ENVIRONMENT}
spec:
  type: ClusterIP
  selector:
    app: gatus
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
