---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: gatus
  labels:
    app.kubernetes.io/name: gatus
    app.kubernetes.io/instance: gatus-${ENVIRONMENT}
data:
  # Mounted at /config/config.yaml. Gatus watches this file and reloads on
  # change, so a Flux reconcile of an edit propagates to the running pod
  # without a rollout (kubelet refresh, ~60s).
  # Flux postBuild substitutes ${...} from cluster-config at reconcile;
  # $${VAR} escapes the substitution so Gatus expands it at runtime from env.
  config.yaml: |
    metrics: true
    storage:
      # Postgres persistence (N-6) — backed by gatus-${ENVIRONMENT}-cluster
      # CNPG, libpq DSN avoids URL-encoding pitfalls on the 1P password.
      # sslmode=require matches the cluster's hostssl pg_hba (encrypted, no
      # cert-pinning — CNPG self-signs).
      type: postgres
      path: "host=gatus-${ENVIRONMENT}-cluster-rw port=5432 user=$${PG_USER} password=$${PG_PASSWORD} dbname=gatus sslmode=require"
    ui:
      title: "th0th · ${ENVIRONMENT} status"
      description: "Live status for th0th.dev services."
      header: "th0th · ${ENVIRONMENT}"
    alerting:
      # $${SLACK_WEBHOOK_URL} escapes Flux envsubst so Gatus expands it from
      # the SLACK_WEBHOOK_URL env (sourced from the gatus-slack-webhook
      # Secret / 1Password item `metrics_webhook_dev`).
      slack:
        webhook-url: "$${SLACK_WEBHOOK_URL}"
        default-alert:
          failure-threshold: 3
          success-threshold: 2
          send-on-resolved: true
    endpoints:
      # Applications — probe the user-facing hostname (DNS + Cilium Gateway +
      # cert + backend). SSO-gated apps redirect to /authorize → 302; we accept
      # anything < 400 as "service is up". `alerts: [- type: slack]` opts each
      # endpoint into the alerting.slack defaults set above.
      - name: authentik
        group: applications
        url: https://${AUTHENTIK_SUBDOMAIN}.th0th.dev
        interval: 30s
        conditions:
          - "[STATUS] < 400"
          - "[RESPONSE_TIME] < 3000"
        alerts:
          - type: slack
      - name: grafana
        group: applications
        url: https://${GRAFANA_SUBDOMAIN}.th0th.dev
        interval: 30s
        conditions:
          - "[STATUS] < 400"
          - "[RESPONSE_TIME] < 3000"
        alerts:
          - type: slack
      - name: freshrss
        group: applications
        url: https://${FRESHRSS_SUBDOMAIN}.th0th.dev
        interval: 30s
        conditions:
          - "[STATUS] < 400"
          - "[RESPONSE_TIME] < 3000"
        alerts:
          - type: slack
      - name: homer
        group: applications
        url: https://${HOMER_SUBDOMAIN}.th0th.dev
        interval: 30s
        conditions:
          - "[STATUS] < 400"
          - "[RESPONSE_TIME] < 2000"
        alerts:
          - type: slack
      # Infrastructure — off-cluster, self-signed certs (insecure: true).
      - name: TrueNAS
        group: infrastructure
        url: https://${TRUENAS_HOST}
        interval: 60s
        client:
          insecure: true
        conditions:
          - "[STATUS] < 500"
          - "[RESPONSE_TIME] < 3000"
        alerts:
          - type: slack
      - name: UniFi
        group: infrastructure
        url: https://${INTERNAL_DNS_RESOLVER}
        interval: 60s
        client:
          insecure: true
        conditions:
          - "[STATUS] < 500"
          - "[RESPONSE_TIME] < 3000"
        alerts:
          - type: slack
