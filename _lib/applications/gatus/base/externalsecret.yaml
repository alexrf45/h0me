---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gatus-slack-webhook
  namespace: gatus
  labels:
    app.kubernetes.io/name: gatus
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: gatus-slack-webhook
    creationPolicy: Owner
  data:
    # Reuses the same 1Password item Alertmanager's slack-webhook ESO uses
    # (`metrics_webhook_dev`/`credential`) so a webhook rotation propagates
    # to both consumers.
    - secretKey: url
      remoteRef:
        key: metrics_webhook_dev
        property: credential
