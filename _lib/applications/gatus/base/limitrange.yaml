---
apiVersion: v1
kind: LimitRange
metadata:
  name: gatus-defaults
  namespace: gatus
spec:
  limits:
    # Defaults injected into any container that omits resources — notably the
    # CNPG postgres pods (the Cluster spec sets none) — so the ResourceQuota
    # can require requests + limits on every pod without rejecting them.
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
