---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: homer
  namespace: homer
spec:
  # Guardrail for a single tiny static dashboard pod (Recreate strategy, no
  # rollout surge). Sized well above the container's 5m/16Mi request and
  # 100m/32Mi limit.
  hard:
    requests.cpu: 100m
    requests.memory: 64Mi
    limits.cpu: 500m
    limits.memory: 256Mi
