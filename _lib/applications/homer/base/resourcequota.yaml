---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: homer
  namespace: homer
spec:
  # Guardrail for the static dashboard pod plus its in-namespace Coraza WAF
  # proxy (homer-waf: 50m/128Mi req, 500m/256Mi limit). Sized with headroom for
  # both plus a rollout surge.
  hard:
    requests.cpu: 300m
    requests.memory: 512Mi
    limits.cpu: "2"
    limits.memory: 1Gi
