---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homer-config
  namespace: homer
  labels:
    app.kubernetes.io/name: homer
    app.kubernetes.io/instance: homer-${ENVIRONMENT}
data:
  # Mounted at /www/assets/config.yml. Homer reads this at request time, so a
  # `kubectl rollout` is not required after a Flux reconcile — the running pod
  # picks up edits on the next page load. Links use the cluster-config
  # subdomains so they stay in sync via Flux postBuild substitution.
  config.yml: |
    ---
    title: "th0th"
    subtitle: "${ENVIRONMENT} · memphis"
    header: true
    footer: false
    columns: "auto"
    connectivityCheck: true
    # GitHub theme — variant file must precede the base. gh-auto follows the
    # system light/dark setting (see homer-theme ConfigMap / kustomization).
    stylesheet:
      - "assets/themes/gh-auto.min.css"
      - "assets/themes/gh-base.min.css"
    defaults:
      layout: columns
      colorTheme: auto
    services:
      - name: "Applications"
        icon: "fas fa-cubes"
        items:
          - name: "FreshRSS"
            subtitle: "RSS reader"
            icon: "fas fa-rss"
            url: "https://${FRESHRSS_SUBDOMAIN}.th0th.dev"
            target: "_blank"
      - name: "Identity & Observability"
        icon: "fas fa-shield-halved"
        items:
          - name: "Authentik"
            subtitle: "SSO / IdP"
            icon: "fas fa-key"
            url: "https://${AUTHENTIK_SUBDOMAIN}.th0th.dev"
            target: "_blank"
          - name: "Grafana"
            subtitle: "Dashboards & metrics"
            icon: "fas fa-chart-line"
            url: "https://${GRAFANA_SUBDOMAIN}.th0th.dev"
            target: "_blank"
          - name: "Gatus"
            subtitle: "Service status"
            icon: "fas fa-heart-pulse"
            url: "https://${GATUS_SUBDOMAIN}.th0th.dev"
            target: "_blank"
      - name: "Infrastructure"
        icon: "fas fa-server"
        items:
          - name: "TrueNAS"
            subtitle: "Storage"
            icon: "fas fa-hard-drive"
            url: "https://${TRUENAS_HOST}"
            target: "_blank"
          - name: "UniFi"
            subtitle: "Network"
            icon: "fas fa-network-wired"
            url: "https://10.3.3.1"
            target: "_blank"
