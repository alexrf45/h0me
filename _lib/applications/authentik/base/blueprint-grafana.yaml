---
# Authentik blueprint that declaratively provisions the Grafana OIDC
# integration (provider + application + entitlements + admin binding). The
# worker auto-discovers and applies any *.yaml under /blueprints; this
# ConfigMap is mounted there via the chart's blueprints.configMaps value.
#
# client_id/client_secret are read from the pod env (!Env) which the
# authentik-grafana-oidc ExternalSecret populates from 1Password. The same
# 1Password item feeds Grafana's grafana-oidc secret, so both ends match.
#
# Entitlement names MUST stay in lockstep with Grafana's role_attribute_path
# JMESPath in _lib/observability/kube-prometheus-stack/helmrelease.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-grafana-blueprint
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: blueprint
data:
  grafana.yaml: |
    version: 1
    metadata:
      name: grafana-oidc
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # --- OAuth2 / OpenID provider -------------------------------------
      - model: authentik_providers_oauth2.oauth2provider
        id: grafana-provider
        state: present
        identifiers:
          name: grafana
        attrs:
          name: grafana
          client_type: confidential
          client_id: !Env GRAFANA_OIDC_CLIENT_ID
          client_secret: !Env GRAFANA_OIDC_CLIENT_SECRET
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          # Default hashed_user_id ties sub to authentik's internal user PK
          # + signing-key salt, so any DB restore that recreates the user
          # row resets sub and breaks downstream user_auth linkages (we hit
          # this after the CNPG single-instance migration in d09126e).
          sub_mode: user_email
          redirect_uris:
            - matching_mode: strict
              url: "https://${GRAFANA_SUBDOMAIN}.th0th.dev/login/generic_oauth"
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-entitlements]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-offline_access]]
      # --- Application bound to the provider -----------------------------
      - model: authentik_core.application
        id: grafana-app
        state: present
        identifiers:
          slug: grafana
        attrs:
          name: Grafana
          slug: grafana
          provider: !KeyOf grafana-provider
          meta_launch_url: "https://${GRAFANA_SUBDOMAIN}.th0th.dev/"
          meta_description: "Observability dashboards (Prometheus, Loki, Tempo)"
          meta_publisher: "Grafana Labs"
      # --- Per-app entitlements (names map to Grafana roles) -------------
      - model: authentik_core.applicationentitlement
        id: grafana-ent-admins
        state: present
        identifiers:
          name: "Grafana Admins"
          app: !KeyOf grafana-app
        attrs:
          name: "Grafana Admins"
      - model: authentik_core.applicationentitlement
        id: grafana-ent-editors
        state: present
        identifiers:
          name: "Grafana Editors"
          app: !KeyOf grafana-app
        attrs:
          name: "Grafana Editors"
      - model: authentik_core.applicationentitlement
        id: grafana-ent-viewers
        state: present
        identifiers:
          name: "Grafana Viewers"
          app: !KeyOf grafana-app
        attrs:
          name: "Grafana Viewers"
      # --- Grant Admin to the built-in superuser group on first login ---
      # Other users fall through to Viewer via Grafana's role_attribute_path;
      # bind specific users/groups to Editors/Viewers here or in the UI later.
      - model: authentik_policies.policybinding
        id: grafana-pb-admins
        state: present
        identifiers:
          target: !KeyOf grafana-ent-admins
          group: !Find [authentik_core.group, [name, "authentik Admins"]]
          order: 0
        attrs:
          enabled: true
