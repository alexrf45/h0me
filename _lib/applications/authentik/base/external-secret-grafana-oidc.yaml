---
# Grafana OIDC client credentials, surfaced to the Authentik server+worker as
# env vars so the Grafana blueprint can reference them via !Env. Sourced from
# the SAME 1Password item Grafana's own ExternalSecret reads
# (grafana_oidc_${ENVIRONMENT}) so both sides of the OIDC handshake share one
# source of truth. Loaded into the pods by the chart's global.envFrom.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-grafana-oidc
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authentik-grafana-oidc
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        GRAFANA_OIDC_CLIENT_ID: "{{ .client_id }}"
        GRAFANA_OIDC_CLIENT_SECRET: "{{ .client_secret }}"
  data:
    - secretKey: client_id
      remoteRef:
        key: grafana_oidc_${ENVIRONMENT}
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: grafana_oidc_${ENVIRONMENT}
        property: client_secret
