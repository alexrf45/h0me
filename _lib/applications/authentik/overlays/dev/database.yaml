---
# Single-instance CNPG cluster on a static iSCSI PV per ADR-0003.
# Backups land as CSI VolumeSnapshots (→ TrueNAS ZFS snapshots) via the
# ScheduledBackup below. Independent rip cord: see dump-cronjob.yaml +
# _docs/guides/cnpg-rescue.md.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-${ENVIRONMENT}-cluster
  namespace: authentik
  labels:
    app: "authentik"
    node: "worker"
    env: "${ENVIRONMENT}"
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17.4-6@sha256:4ebb83ad6701cf90cd16f4c0b502676238ffdb1169bf27c5ae60e9a5bdc7b925
  instances: 1
  postgresql:
    pg_hba:
      - hostssl authentik authentik 10.43.0.0/16 scram-sha-256
    parameters:
      "pgaudit.log": "all, -misc"
      "pgaudit.log_catalog": "off"
      "pgaudit.log_parameter": "on"
      "pgaudit.log_relation": "on"
  monitoring:
    enablePodMonitor: true
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-env
  superuserSecret:
    name: authentik-env
  storage:
    size: 10Gi
    storageClass: iscsi
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      storageClassName: iscsi
      volumeName: dev-authentik-db-pv
      resources:
        requests:
          storage: 10Gi
  backup:
    volumeSnapshot:
      className: freenas-iscsi
      snapshotOwnerReference: backup
      online: true
      onlineConfiguration:
        immediateCheckpoint: true
        waitForArchive: false
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: authentik-${ENVIRONMENT}-cluster-snap
  namespace: authentik
  labels:
    app: authentik
    component: backup
spec:
  schedule: "0 30 4 * * *"
  backupOwnerReference: self
  immediate: false
  method: volumeSnapshot
  cluster:
    name: authentik-${ENVIRONMENT}-cluster
