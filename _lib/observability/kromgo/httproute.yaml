---
# Internal route — Cilium Gateway exposes kromgo on the LAN/Tailscale path
# for debugging the metric endpoints (curl from a laptop). The public path
# (shields.io renderer → README badges) goes via cloudflared, not this route.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kromgo-internal
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kromgo
    app.kubernetes.io/instance: kromgo-${ENVIRONMENT}
    environment: "${ENVIRONMENT}"
spec:
  parentRefs:
    - name: ${GATEWAY_NAME}
      namespace: networking
  hostnames:
    - "${KROMGO_SUBDOMAIN}.th0th.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kromgo
          port: 8080
