---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-gatus
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: dashboard-gatus
data:
  dashboard-gatus.json: |
    {
      "id": null,
      "uid": "gatus-uptime",
      "title": "Gatus — Uptime & Latency",
      "tags": [
        "gatus",
        "uptime"
      ],
      "schemaVersion": 37,
      "version": 1,
      "editable": true,
      "graphTooltip": 0,
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "refresh": "1m",
      "timezone": "",
      "templating": {
        "list": []
      },
      "annotations": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "title": "Endpoint up (last sample)",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 4
          },
          "targets": [
            {
              "expr": "gatus_results_endpoint_success",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bool_on_off",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "value": null,
                    "color": "red"
                  },
                  {
                    "value": 1,
                    "color": "green"
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 2,
          "title": "Success ratio (5m rate)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "sum by (name) (rate(gatus_results_success_total[$__rate_interval])) / clamp_min(sum by (name) (rate(gatus_results_total[$__rate_interval])), 0.0001)",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "lineInterpolation": "smooth",
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi"
            }
          }
        },
        {
          "id": 3,
          "title": "Response time p95 (5m)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "x": 12,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, name) (rate(gatus_results_duration_seconds_bucket[$__rate_interval])))",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "lineInterpolation": "smooth",
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi"
            }
          }
        },
        {
          "id": 4,
          "title": "Failed probes per minute",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "sum by (name) (rate(gatus_results_total{success=\"false\"}[$__rate_interval])) * 60",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineInterpolation": "smooth",
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi"
            }
          }
        },
        {
          "id": 5,
          "title": "Response time mean (5m)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "x": 12,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "sum by (name) (rate(gatus_results_duration_seconds_sum[$__rate_interval])) / clamp_min(sum by (name) (rate(gatus_results_duration_seconds_count[$__rate_interval])), 0.0001)",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "lineInterpolation": "smooth",
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi"
            }
          }
        }
      ]
    }
