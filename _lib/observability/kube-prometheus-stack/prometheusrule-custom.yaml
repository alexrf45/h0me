---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: th0th-custom-rules
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    - name: pod-oom
      interval: 30s
      rules:
        - alert: PodOOMKilled
          expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Container OOMKilled in {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled. Raise memory limits or investigate the workload."

    - name: flux-reconciliation
      interval: 30m
      rules:
        - alert: FluxKustomizationNotReady
          expr: max by (namespace, name) (gotk_reconcile_condition{type="Ready", status="False", kind="Kustomization"}) == 1
          for: 10m
          labels:
            severity: warning
            component: flux
          annotations:
            summary: "Flux Kustomization {{ $labels.namespace }}/{{ $labels.name }} not ready"
            description: "Kustomization has been NotReady for 10m. Run `k8sop dev flux get kustomization {{ $labels.name }}` for the reconciliation error."

        - alert: FluxHelmReleaseNotReady
          expr: max by (namespace, name) (gotk_reconcile_condition{type="Ready", status="False", kind="HelmRelease"}) == 1
          for: 10m
          labels:
            severity: warning
            component: flux
          annotations:
            summary: "Flux HelmRelease {{ $labels.namespace }}/{{ $labels.name }} not ready"
            description: "HelmRelease has been NotReady for 10m. Check chart values and CRD readiness."

        - alert: FluxResourceSuspended
          expr: max by (namespace, name, kind) (gotk_suspend_status{kind=~"Kustomization|HelmRelease"}) == 1
          for: 6h
          labels:
            severity: warning
            component: flux
          annotations:
            summary: "Flux {{ $labels.kind }} {{ $labels.namespace }}/{{ $labels.name }} suspended >6h"
            description: "A Flux reconciler has been suspended over 6h. Confirm this is intentional."

    - name: cnpg-backup-staleness
      interval: 30m
      rules:
        # Primary recovery path: the ScheduledBackup writing VolumeSnapshots.
        # The CNPG instance manager exposes the last-successful-backup
        # timestamp. The `> 0` guard avoids paging on a brand-new cluster
        # whose first scheduled backup hasn't run yet.
        - alert: CNPGBackupStale
          expr: |
            (time() - max by (cluster, namespace) (cnpg_collector_last_available_backup_timestamp)) > 36 * 3600
            and on (cluster, namespace)
            max by (cluster, namespace) (cnpg_collector_last_available_backup_timestamp) > 0
          for: 30m
          labels:
            severity: critical
            component: cnpg
          annotations:
            summary: "CNPG {{ $labels.namespace }}/{{ $labels.cluster }}: no successful backup in >36h"
            description: "Last successful CNPG Backup is older than 36h. The VolumeSnapshot recovery path is degraded. Investigate the latest Backup CR in the cluster's namespace and the ScheduledBackup state."

        # Secondary (S-6) recovery path: the per-namespace pg_dump CronJob.
        # `kube_cronjob_status_last_successful_time` only appears once a
        # job has succeeded at least once, so absent metric == never run
        # — that's a separate signal (FluxKustomizationNotReady covers it
        # in practice; we don't want to double-page during S-6 ramp-up).
        - alert: CNPGDumpCronJobStale
          expr: |
            (time() - max by (namespace, cronjob) (kube_cronjob_status_last_successful_time{cronjob=~".*-cnpg-dump"})) > 36 * 3600
          for: 30m
          labels:
            severity: warning
            component: cnpg
          annotations:
            summary: "CNPG dump CronJob {{ $labels.namespace }}/{{ $labels.cronjob }}: no successful run in >36h"
            description: "The independent pg_dump rip cord (S-6) has not produced a fresh dump in >36h. VolumeSnapshot backups may still be healthy — check the CronJob job history and the dump PVC."

    # Cert expiry — cert-manager emits a per-Certificate expiry timestamp.
    # The live metric in this cluster is `certmanager_certificate_expiration_timestamp_seconds`
    # (verified 2026-05-28 via in-cluster Prometheus /api/v1/label/__name__/values).
    # Days-to-expiry = (timestamp - now) / 86400. Two tiers so renewals get a
    # warning shot before they page.
    - name: cert-manager-expiry
      interval: 30m
      rules:
        - alert: CertExpiringSoon
          expr: |
            (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400 < 14
            and
            (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400 >= 3
          for: 1h
          labels:
            severity: warning
            app: cert-manager
          annotations:
            summary: "Certificate {{ $labels.exported_namespace }}/{{ $labels.name }} expires in <14d"
            description: |
              cert-manager Certificate {{ $labels.name }} (issuer {{ $labels.issuer_kind }}/{{ $labels.issuer_name }}) has {{ printf "%.1f" $value }} days left.
              Confirm renewal is progressing; check `kube dev -n {{ $labels.exported_namespace }} describe certificate {{ $labels.name }}` for ACME or issuer errors.

        - alert: CertExpiringSoon
          expr: |
            (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400 < 3
          for: 1h
          labels:
            severity: critical
            app: cert-manager
          annotations:
            summary: "Certificate {{ $labels.exported_namespace }}/{{ $labels.name }} expires in <3d"
            description: |
              cert-manager Certificate {{ $labels.name }} (issuer {{ $labels.issuer_kind }}/{{ $labels.issuer_name }}) has {{ printf "%.1f" $value }} days left and is about to outage TLS.
              Force renewal: `kube dev -n {{ $labels.exported_namespace }} cmctl renew {{ $labels.name }}`. Investigate the Issuer if renewal is failing.

    # PVC near-full — kubelet exposes available + capacity bytes per PVC.
    # `*-dumps-pvc` are the S-6 pg_dump rip cord volumes; they're sized to
    # fill up by design (oldest dumps rotate out), so excluding them prevents
    # constant noise. Warning at <10% free, critical at <5% free.
    - name: pvc-capacity
      interval: 1m
      rules:
        - alert: PVCNearFull
          expr: |
            (
              kubelet_volume_stats_available_bytes{persistentvolumeclaim!~".*-dumps-pvc"}
              /
              kubelet_volume_stats_capacity_bytes{persistentvolumeclaim!~".*-dumps-pvc"}
            ) < 0.10
            and
            (
              kubelet_volume_stats_available_bytes{persistentvolumeclaim!~".*-dumps-pvc"}
              /
              kubelet_volume_stats_capacity_bytes{persistentvolumeclaim!~".*-dumps-pvc"}
            ) >= 0.05
          for: 30m
          labels:
            severity: warning
            pvc: "{{ $labels.persistentvolumeclaim }}"
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ humanizePercentage $value }} free (<10%)"
            description: "PersistentVolumeClaim {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has <10% free space for 30m. Consider expanding the PVC (storage class supports online expansion) or pruning data."

        - alert: PVCNearFull
          expr: |
            (
              kubelet_volume_stats_available_bytes{persistentvolumeclaim!~".*-dumps-pvc"}
              /
              kubelet_volume_stats_capacity_bytes{persistentvolumeclaim!~".*-dumps-pvc"}
            ) < 0.05
          for: 10m
          labels:
            severity: critical
            pvc: "{{ $labels.persistentvolumeclaim }}"
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ humanizePercentage $value }} free (<5%)"
            description: "PersistentVolumeClaim {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has <5% free space — writes will start failing soon. Expand the volume now or free space; the workload may degrade or crash."

    # Gatus endpoint down — Gatus emits `gatus_results_endpoint_success` as a
    # 0/1 gauge per endpoint, labelled by `key` (group + name, e.g.
    # `applications_authentik`). Verified live 2026-05-28 via the in-cluster
    # PodMonitor target. A sustained 0 means probes have been failing for the
    # configured window in Gatus.
    - name: gatus-endpoints
      interval: 1m
      rules:
        - alert: GatusEndpointDown
          expr: gatus_results_endpoint_success == 0
          for: 5m
          labels:
            severity: warning
            app: gatus
            endpoint: "{{ $labels.key }}"
          annotations:
            summary: "Gatus endpoint {{ $labels.key }} ({{ $labels.name }}) failing probes"
            description: "Gatus endpoint key={{ $labels.key }} group={{ $labels.group }} name={{ $labels.name }} type={{ $labels.type }} has been failing probes for 5m. Open the Gatus dashboard to see which condition is red."
