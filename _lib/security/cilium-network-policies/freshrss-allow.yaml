---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: freshrss-allow
  labels:
    th0th.dev/policy-target: application
    app: freshrss
spec:
  description: |
    Allow rules for the freshrss application pod: gateway ingress, DNS,
    egress to its CNPG cluster, and outbound HTTP(S) for feed fetching.
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: freshrss
      app: freshrss
  ingress:
    # App traffic now arrives from the freshrss-waf (Coraza) pod, not the
    # gateway directly. Starter Cilium L7 policy: allow only a safe HTTP
    # method set into the app pod — defense-in-depth beneath the signature WAF.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: freshrss
            app: freshrss-waf
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
          rules:
            http:
              - method: GET
              - method: POST
              - method: HEAD
              - method: OPTIONS
    # Kubelet probes hit port 80 directly — keep them L4-only so the L7 method
    # filter above does not apply to them.
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
  egress:
    # DNS lookup against kube-dns
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # CNPG instance pods, same namespace
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: freshrss
            cnpg.io/cluster: freshrss-${ENVIRONMENT}-cluster
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Outbound feed fetching. RSS/Atom endpoints are arbitrary public hosts.
    # toEntities: world keeps it simple; a follow-up can tighten via toFQDNs
    # once L7 DNS visibility is enabled.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
