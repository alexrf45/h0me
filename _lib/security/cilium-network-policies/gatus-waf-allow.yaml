---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: gatus-waf-allow
  labels:
    th0th.dev/policy-target: application
    app: gatus-waf
spec:
  description: |
    Allow rules for the gatus Coraza WAF proxy: gateway ingress on 8080,
    DNS, and egress to the gatus app pod on 8080. Only the internal gateway
    route is fronted by the WAF; the public cloudflared path and the Prometheus
    scrape still reach the gatus pod directly (see gatus-allow).
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: gatus
      app: gatus-waf
  ingress:
    # Cilium Gateway API: backend connections arrive from the reserved:ingress
    # identity (cilium-envoy). host / remote-node cover kubelet probes.
    - fromEntities:
        - ingress
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Upstream: the gatus application pod.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gatus
            app: gatus
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
