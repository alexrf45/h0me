---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: gatus-cnpg-allow
  labels:
    th0th.dev/policy-target: application
    app: gatus
    component: database
spec:
  description: |
    Allow rules for the CNPG-managed Postgres cluster backing gatus (N-6).
    Covers gatus app → primary on 5432, the S-6 dump CronJob, intra-cluster
    plumbing (instance-manager probes, replication), Prometheus metrics
    scrape, DNS, and kube-apiserver egress.
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: gatus
      cnpg.io/cluster: gatus-${ENVIRONMENT}-cluster
  ingress:
    # gatus app → primary on 5432
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gatus
            app: gatus
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Daily pg_dump CronJob (S-6 rip cord) → primary on 5432
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gatus
            app: cnpg-dump
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Intra-cluster: streaming replication + instance-manager probes
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gatus
            cnpg.io/cluster: gatus-${ENVIRONMENT}-cluster
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
            - port: "8000"
              protocol: TCP
            - port: "9187"
              protocol: TCP
    # Prometheus scrape of metrics + instance-manager
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9187"
              protocol: TCP
            - port: "8000"
              protocol: TCP
    # CNPG operator → instance-manager status extraction. Without this the
    # operator can't read /pg/status (port 8000), ConsistentSystemID stays
    # False, and the cluster sticks at 1/N. See [[cnpg-ccnps-operator-ingress]].
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: database
            k8s:app.kubernetes.io/name: cloudnative-pg
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Health/readiness/liveness probes are issued by the kubelet, which
    # presents as host / remote-node identity.
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Intra-cluster: replication and peer health
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gatus
            cnpg.io/cluster: gatus-${ENVIRONMENT}-cluster
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
            - port: "8000"
              protocol: TCP
            - port: "9187"
              protocol: TCP
    # kube-apiserver — the CNPG instance manager keeps Cluster status fresh
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
            - port: "443"
              protocol: TCP
