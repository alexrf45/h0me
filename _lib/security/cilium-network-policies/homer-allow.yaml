---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: homer-allow
  labels:
    th0th.dev/policy-target: application
    app: homer
spec:
  description: |
    Allow rules for the homer dashboard pod. Homer is a static file server:
    it accepts gateway ingress on 8080 and needs DNS only. The dashboard's
    connectivity checks run in the browser, not the pod, so no egress to the
    linked services is required.
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: homer
      app: homer
  ingress:
    # App traffic now arrives from the homer-waf (Coraza) pod, not the gateway
    # directly. Starter Cilium L7 policy: allow only a safe HTTP method set into
    # the static dashboard — defense-in-depth beneath the signature WAF.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: homer
            app: homer-waf
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - method: GET
              - method: HEAD
              - method: OPTIONS
    # Kubelet probes hit port 8080 directly — keep them L4-only so the L7 method
    # filter above does not apply to them.
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # DNS lookup against kube-dns
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
