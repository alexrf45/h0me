---
# Starter custom rules for Falco. Authored as a standalone ConfigMap so the
# rule library has its own lifecycle separate from the Helm chart values
# (review-friendly Git diffs, no chart-version bumps to ship a rule).
#
# Mounting status: NOT yet wired into the Falco DaemonSet — H-3 ships the
# baseline so the rule pipeline is reviewable in Git. A follow-up sprint
# adds `mounts.volumes`/`mounts.volumeMounts` to the HR pointing at
# /etc/falco/rules.d so this ConfigMap is loaded at runtime. Until then
# Falco runs with the falcoctl-managed upstream rule packs (falco-rules
# and falco-incubating-rules) — already enabled in helmrelease.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-custom-rules
  namespace: security
  labels:
    app.kubernetes.io/name: falco
    app.kubernetes.io/component: rules
data:
  custom-rules.yaml: |
    # ---------------------------------------------------------------
    # th0th.dev homelab — custom Falco rules (baseline)
    # ---------------------------------------------------------------
    # Keep this list intentionally short. Each rule should pull its
    # weight on a hobby cluster — anything noisy in dev gets dropped.

    - macro: home_0ps_namespaces
      condition: >
        k8s.ns.name in (
          security, monitoring, flux-system, kube-system,
          cert-manager, external-secrets, database, authentik,
          freshrss, homer, cloudflared, tailscale
        )

    - rule: Shell spawned in lab namespace
      desc: >
        A shell was launched inside a pod in a th0th.dev namespace.
        Legit operator work (kubectl exec) trips this — that is the point;
        the alert is the audit trail.
      condition: >
        spawned_process
        and container
        and shell_procs
        and home_0ps_namespaces
      output: >
        Shell spawned in lab pod
        (user=%user.name user_loginuid=%user.loginuid
        shell=%proc.name parent=%proc.pname cmdline=%proc.cmdline
        ns=%k8s.ns.name pod=%k8s.pod.name container=%container.name
        image=%container.image.repository)
      priority: NOTICE
      tags: [shell, mitre_execution, th0th]

    - rule: Write below etc in lab namespace
      desc: >
        File write into /etc from a container in a th0th.dev namespace.
        Excludes the normal package/cert manager writers; everything else
        is suspicious enough to surface.
      condition: >
        evt.dir = <
        and (evt.type in (open, openat, openat2, creat))
        and (fd.typechar = 'f' or fd.typechar = 0)
        and fd.name startswith /etc
        and (evt.arg.flags contains O_WRONLY
             or evt.arg.flags contains O_RDWR
             or evt.arg.flags contains O_CREAT
             or evt.arg.flags contains O_TRUNC)
        and container
        and home_0ps_namespaces
        and not proc.name in (apt, apt-get, dpkg, yum, dnf, microdnf,
                              update-ca-certificates, c_rehash, openssl)
      output: >
        Write below /etc in lab pod
        (file=%fd.name proc=%proc.name parent=%proc.pname
        cmdline=%proc.cmdline user=%user.name
        ns=%k8s.ns.name pod=%k8s.pod.name image=%container.image.repository)
      priority: WARNING
      tags: [filesystem, mitre_persistence, th0th]
