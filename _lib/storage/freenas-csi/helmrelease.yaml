---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: democratic-csi-freenas
  namespace: flux-system
spec:
  interval: 12h
  chart:
    spec:
      chart: democratic-csi
      version: "0.15.0"
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
        namespace: flux-system
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  targetNamespace: storage
  values:
    controller:
      driver:
        image:
          registry: docker.io/democraticcsi/democratic-csi
          tag: next
    csiDriver:
      name: "freenas-api-iscsi"
    csiProxy:
      enabled: false
    storageClasses:
      - name: ${STORAGE_CLASS_NAME}
        defaultClass: true
        reclaimPolicy: ${RECLAIM_POLICY}
        volumeBindingMode: Immediate
        allowVolumeExpansion: true
        parameters:
          fsType: ext4
          detachedVolumesFromSnapshots: "false"

    driver:
      existingConfigSecret: democratic-csi-freenas-config
      config:
        driver: freenas-api-iscsi
    node:
      hostPID: true
      driver:
        image:
          registry: docker.io/democraticcsi/democratic-csi
          tag: next
          pullPolicy: Always
        extraEnv:
          - name: ISCSIADM_HOST_STRATEGY
            value: nsenter
          - name: ISCSIADM_HOST_PATH
            value: /usr/local/sbin/iscsiadm
        iscsiDirHostPath: /var/etc/iscsi
        iscsiDirHostPathType: DirectoryOrCreate
