---
# Pinned to v8.2.1 to match the csi-snapshotter sidecar in
# _lib/storage/freenas-csi/. Bump these together with the CRDs at
# global/crds/external-snapshotter/.
#
# Upstream installs to kube-system; retarget to `storage` so this lives
# alongside the rest of the lab's storage components.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: storage
resources:
  - rbac-snapshot-controller.yaml
  - setup-snapshot-controller.yaml
patches:
  - target:
      kind: Deployment
      name: snapshot-controller
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node: worker
