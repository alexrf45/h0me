---
# Root sync target for the FluxInstance (spec.sync.path = ./_clusters/dev).
# Applies the app-of-apps Flux Kustomizations defined in cluster.yaml. The
# cluster-config ConfigMap (./config) is reconciled by the cluster-config
# Kustomization inside cluster.yaml, not from here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cluster.yaml
